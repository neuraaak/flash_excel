# ///////////////////////////////////////////////////////////////
# PRE-COMMIT CONFIGURATION
# ///////////////////////////////////////////////////////////////
# Mirrors the quality checks in .scripts/dev/lint.py (in order):
#   1. ruff format     — auto-format code
#   2. ruff check      — lint with auto-fix
#   3. ty check        — type checking
#   4. lint-imports    — layer dependency contracts
#   5. update_version  — sync _version.py ← pyproject.toml
#
# Setup (run once per clone):
#   git config --unset core.hooksPath   # disable legacy .hooks/ mechanism
#   uv add --dev pre-commit             # or: pip install pre-commit
#   pre-commit install
#
# Run manually on all files:
#   pre-commit run --all-files
#
# Notes:
#   - Steps 3–5 use language: system and delegate to uv so they always
#     run inside the project venv (requires: uv sync).
#   - ruff config is read from pyproject.toml [tool.ruff].
#   - When ruff or sync-version modifies files, pre-commit aborts the
#     commit; stage the changes (git add -u) and recommit.

default_language_version:
  python: python

repos:
  # ///////////////////////////////////////////////////////////////
  # FILE HYGIENE
  # ///////////////////////////////////////////////////////////////
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: debug-statements

  # ///////////////////////////////////////////////////////////////
  # RUFF — format then lint  (steps 1 & 2 of lint.py)
  # Config is read from pyproject.toml [tool.ruff]
  # ///////////////////////////////////////////////////////////////
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      # Step 1 — format
      - id: ruff-format
        name: "Ruff Format"

      # Step 2 — lint with auto-fix
      # --exit-non-zero-on-fix: abort commit so dev can review & re-stage
      - id: ruff
        name: "Ruff Check"
        args: [--fix, --exit-non-zero-on-fix]

  # ///////////////////////////////////////////////////////////////
  # LOCAL HOOKS — ty, import-linter, version sync  (steps 3–5)
  # language: system  →  executed via the project venv through uv
  # Prerequisite: uv sync (editable install required for import-linter)
  # ///////////////////////////////////////////////////////////////
  - repo: local
    hooks:
      # Step 3 — type check
      - id: ty
        name: "Ty — type check"
        language: system
        entry: uv run --no-sync ty check --output-format=concise
        types: [python]
        pass_filenames: false

      # Step 4 — layer dependency contracts
      # Relies on editable install so that {{ project_slug }} is importable
      # without an explicit PYTHONPATH override.
      - id: import-linter
        name: "Import Linter — layer contracts"
        language: system
        entry: uv run --no-sync lint-imports
        pass_filenames: false
        always_run: true

      # Step 5 — keep _version.py in sync with pyproject.toml
      # Only triggered when pyproject.toml is staged.
      - id: sync-version
        name: "Sync _version.py ← pyproject.toml"
        language: system
        entry: uv run --no-sync python .scripts/dev/update_version.py
        files: ^pyproject\.toml$
        pass_filenames: false
